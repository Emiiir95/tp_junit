name: CI — Tests + Build Docker

on:
  push:
  pull_request:

jobs:
  # JOB 1 : TESTS
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Lancer les tests
        run: mvn --batch-mode test

  # JOB 2 : BUILD + PUSH DOCKER
  build-push:
    needs: test # ⚠️ IMPORTANT → attend que les tests passent
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/emiiir95/tp_junit:latest
            ghcr.io/emiiir95/tp_junit:${{ github.sha }}

